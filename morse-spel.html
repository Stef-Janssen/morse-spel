<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Morse Spel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --dim: #2a2a3e;
    --team1: #00ff88;
    --team2: #ff6b35;
    --team3: #7c3aed;
    --text: #e0e0ff;
    --muted: #5a5a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.75rem;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-align: center;
    background: linear-gradient(135deg, #00ff88, #00ccff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(0,255,136,0.4));
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: -1.5rem;
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .server-input {
    width: 100%;
    padding: 0.85rem 1rem;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .server-input:focus { border-color: #00ccff; }
  .server-input::placeholder { color: var(--muted); }

  .server-status {
    margin-top: 0.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--muted);
  }
  .server-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
  .server-status.ok   .dot { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .server-status.err  .dot { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
  .server-status.conn .dot { background: #ffcc00; animation: blink 0.6s infinite; }

  .teams-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    width: 100%;
  }

  .team-btn {
    padding: 1rem 0.5rem;
    border: 2px solid var(--border);
    background: var(--panel);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .team-btn .team-icon { font-size: 1.5rem; display: block; margin-bottom: 0.4rem; }
  .team-btn.active[data-team="1"] { border-color: var(--team1); color: var(--team1); background: rgba(0,255,136,0.08); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
  .team-btn.active[data-team="2"] { border-color: var(--team2); color: var(--team2); background: rgba(255,107,53,0.08); box-shadow: 0 0 15px rgba(255,107,53,0.2); }
  .team-btn.active[data-team="3"] { border-color: var(--team3); color: var(--team3); background: rgba(124,58,237,0.08); box-shadow: 0 0 15px rgba(124,58,237,0.2); }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    width: 100%;
  }
  .mode-btn {
    padding: 1.5rem 1rem;
    border: 2px solid var(--border);
    background: var(--panel);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .mode-btn .mode-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
  .mode-btn.active { border-color: #00ccff; color: #00ccff; background: rgba(0,204,255,0.08); box-shadow: 0 0 15px rgba(0,204,255,0.2); }

  .start-btn {
    width: 100%;
    padding: 1.2rem;
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: linear-gradient(135deg, #00ff88, #00ccff);
    color: #0a0a0f;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,255,136,0.3); }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  #sender-screen, #receiver-screen {
    display: none;
    width: 100%;
    height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 480px;
  }

  .team-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.4rem 0.8rem;
    border-radius: 20px;
    border: 1px solid;
  }
  .team-badge.t1 { color: var(--team1); border-color: var(--team1); background: rgba(0,255,136,0.1); }
  .team-badge.t2 { color: var(--team2); border-color: var(--team2); background: rgba(255,107,53,0.1); }
  .team-badge.t3 { color: var(--team3); border-color: var(--team3); background: rgba(124,58,237,0.1); }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--muted); color: var(--text); }

  .connection-status {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; transition: background 0.3s; }
  .status-dot.online     { background: #00ff88; box-shadow: 0 0 6px #00ff88; animation: blink 2s infinite; }
  .status-dot.connecting { background: #ffcc00; animation: blink 0.5s infinite; }
  .status-dot.offline    { background: #ff4444; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .morse-btn-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 480px;
  }

  .morse-btn {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 4px solid var(--border);
    background: var(--panel);
    cursor: pointer;
    position: relative;
    transition: all 0.05s;
    -webkit-user-select: none;
    user-select: none;
    outline: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .morse-btn::before {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.05s;
  }
  .morse-btn::after {
    content: '●';
    position: relative;
    z-index: 1;
    font-size: 2rem;
    color: var(--muted);
    transition: all 0.05s;
  }

  .morse-btn.t1.pressing { border-color: var(--team1); box-shadow: 0 0 50px rgba(0,255,136,0.6); transform: scale(0.96); }
  .morse-btn.t1.pressing::before { background: var(--team1); }
  .morse-btn.t1.pressing::after  { color: #0a0a0f; }

  .morse-btn.t2.pressing { border-color: var(--team2); box-shadow: 0 0 50px rgba(255,107,53,0.6); transform: scale(0.96); }
  .morse-btn.t2.pressing::before { background: var(--team2); }
  .morse-btn.t2.pressing::after  { color: #0a0a0f; }

  .morse-btn.t3.pressing { border-color: var(--team3); box-shadow: 0 0 50px rgba(124,58,237,0.6); transform: scale(0.96); }
  .morse-btn.t3.pressing::before { background: var(--team3); }
  .morse-btn.t3.pressing::after  { color: #fff; }

  @keyframes pulse-ring {
    0%   { transform: scale(1);    opacity: 0.5; }
    100% { transform: scale(1.35); opacity: 0;   }
  }
  .pulse-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 3px solid currentColor;
    animation: pulse-ring 0.7s ease-out infinite;
    pointer-events: none;
    display: none;
  }
  .morse-btn.pressing .pulse-ring { display: block; }

  /* RECEIVER volledig scherm */
  #receiver-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    transition: background 0.03s;
    justify-content: flex-start;
  }
  #receiver-screen.lit-1 { background: #00ff88; }
  #receiver-screen.lit-2 { background: #ff6b35; }
  #receiver-screen.lit-3 { background: #7c3aed; }

  .no-select { -webkit-user-select: none; user-select: none; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div>
    <div class="logo">MORSE</div>
    <div class="subtitle">Signaal Spel</div>
  </div>

  <div style="width:100%">
    <div class="section-title">Server adres</div>
    <input class="server-input" id="server-url" type="url"
      placeholder="wss://jouw-project.glitch.me"
      oninput="checkReady()" />
    <div class="server-status" id="server-status">
      <div class="dot"></div>
      <span id="status-msg">Vul het server adres in</span>
    </div>
  </div>

  <div style="width:100%">
    <div class="section-title">Kies je team</div>
    <div class="teams-grid">
      <button class="team-btn" data-team="1" onclick="selectTeam(1)"><span class="team-icon">🟢</span>TEAM 1</button>
      <button class="team-btn" data-team="2" onclick="selectTeam(2)"><span class="team-icon">🟠</span>TEAM 2</button>
      <button class="team-btn" data-team="3" onclick="selectTeam(3)"><span class="team-icon">🟣</span>TEAM 3</button>
    </div>
  </div>

  <div style="width:100%">
    <div class="section-title">Kies je rol</div>
    <div class="mode-grid">
      <button class="mode-btn" id="mode-sender"   onclick="selectMode('sender')">  <span class="mode-icon">📡</span>ZENDER</button>
      <button class="mode-btn" id="mode-receiver" onclick="selectMode('receiver')"><span class="mode-icon">📺</span>ONTVANGER</button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startGame()" disabled>VERBINDEN & STARTEN</button>
</div>

<!-- SENDER -->
<div id="sender-screen">
  <div class="game-header">
    <button class="back-btn" onclick="goBack()">← Terug</button>
    <span style="font-family:'Orbitron',sans-serif;font-size:0.7rem;letter-spacing:0.25em;color:var(--muted)">ZENDER</span>
    <div id="sender-team-badge" class="team-badge">TEAM 1</div>
  </div>

  <div class="morse-btn-wrap">
    <div style="position:relative;display:inline-block;">
      <button class="morse-btn no-select" id="morse-btn"
        onmousedown="pressStart(event)" onmouseup="pressEnd(event)" onmouseleave="pressEnd(event)"
        ontouchstart="pressStart(event)" ontouchend="pressEnd(event)" ontouchcancel="pressEnd(event)">
        <div class="pulse-ring"></div>
      </button>
    </div>
  </div>

  <div class="game-header" style="justify-content:center">
    <div class="connection-status">
      <div class="status-dot connecting" id="sender-dot"></div>
      <span id="sender-conn-text">Verbinden...</span>
    </div>
  </div>
</div>

<!-- RECEIVER -->
<div id="receiver-screen">
  <div class="game-header" style="padding-top:0.5rem">
    <button class="back-btn" onclick="goBack()">← Terug</button>
    <div id="recv-team-badge" class="team-badge">TEAM 1</div>
    <div class="connection-status">
      <div class="status-dot connecting" id="recv-dot"></div>
      <span id="recv-conn-text">Verbinden...</span>
    </div>
  </div>
</div>

<script>
let selectedTeam = null;
let selectedMode = null;
let pressingActive = false;
let pressStartTime = null;
const DOT_THRESHOLD = 300;
let ws = null;
let wsReady = false;

// ── Setup ──
function selectTeam(t) {
  selectedTeam = t;
  document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.team-btn[data-team="${t}"]`).classList.add('active');
  checkReady();
}

function selectMode(m) {
  selectedMode = m;
  document.getElementById('mode-sender').classList.toggle('active', m === 'sender');
  document.getElementById('mode-receiver').classList.toggle('active', m === 'receiver');
  checkReady();
}

function checkReady() {
  const url = document.getElementById('server-url').value.trim();
  document.getElementById('start-btn').disabled = !(selectedTeam && selectedMode && url.length > 5);
}

// ── WebSocket ──
function connectWS(rawUrl, onMessage) {
  let url = rawUrl.trim();
  if (url.startsWith('https://')) url = 'wss://' + url.slice(8);
  else if (url.startsWith('http://')) url = 'ws://' + url.slice(7);
  else if (!url.startsWith('ws')) url = 'wss://' + url;

  setConn('connecting', 'Verbinden...');
  ws = new WebSocket(url);

  ws.onopen  = () => { wsReady = true;  setConn('online',  'Verbonden ✓'); };
  ws.onclose = () => { wsReady = false; setConn('offline', 'Verbinding verbroken'); };
  ws.onerror = () => { wsReady = false; setConn('offline', 'Verbindingsfout'); };
  ws.onmessage = (e) => {
    try { if (onMessage) onMessage(JSON.parse(e.data)); } catch(_) {}
  };
}

function send(data) {
  if (ws && wsReady) ws.send(JSON.stringify(data));
}

function setConn(state, text) {
  ['sender-dot','recv-dot'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'status-dot ' + state;
  });
  ['sender-conn-text','recv-conn-text'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  });
}

// ── Game flow ──
function startGame() {
  const url = document.getElementById('server-url').value.trim();
  document.getElementById('setup').style.display = 'none';

  const teamNames = { 1:'TEAM 1', 2:'TEAM 2', 3:'TEAM 3' };
  const teamClass = { 1:'t1', 2:'t2', 3:'t3' };

  if (selectedMode === 'sender') {
    document.getElementById('sender-screen').style.display = 'flex';
    const badge = document.getElementById('sender-team-badge');
    badge.textContent = teamNames[selectedTeam];
    badge.className = 'team-badge ' + teamClass[selectedTeam];
    document.getElementById('morse-btn').classList.add(teamClass[selectedTeam]);
    connectWS(url, null);

  } else {
    const screen = document.getElementById('receiver-screen');
    screen.style.display = 'flex';
    const badge = document.getElementById('recv-team-badge');
    badge.textContent = teamNames[selectedTeam];
    badge.className = 'team-badge ' + teamClass[selectedTeam];

    connectWS(url, (data) => {
      // Alleen reageren op het eigen team
      if (data.type === 'press' && data.team === selectedTeam) {
        screen.classList.remove('lit-1','lit-2','lit-3');
        if (data.state === 'down') screen.classList.add('lit-' + selectedTeam);
      }
    });
  }
}

function goBack() {
  if (ws) { ws.close(); ws = null; wsReady = false; }
  pressingActive = false;
  document.getElementById('sender-screen').style.display = 'none';
  document.getElementById('receiver-screen').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
}

// ── Morse knop ──
function pressStart(e) {
  e.preventDefault();
  if (pressingActive) return;
  pressingActive = true;
  pressStartTime = Date.now();
  document.getElementById('morse-btn').classList.add('pressing');
  send({ type: 'press', team: selectedTeam, state: 'down' });
}

function pressEnd(e) {
  if (!pressingActive) return;
  pressingActive = false;
  document.getElementById('morse-btn').classList.remove('pressing');
  const duration = Date.now() - pressStartTime;
  send({ type: 'press', team: selectedTeam, state: 'up', duration });
}

// Voorkom zoom op dubbel-tap
document.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    const now = Date.now();
    if (window._lt && now - window._lt < 300) e.preventDefault();
    window._lt = now;
  }
}, { passive: false });
</script>
</body>
</html>
